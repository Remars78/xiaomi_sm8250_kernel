name: Build Alioth Kernel (KernelSU Next)

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'Выбор патча'
        required: true
        default: 'kernelsu-next'
        type: choice
        options:
          - kernelsu-next
          - kernelpatch
          - none

jobs:
  build:
    name: Build Kernel for Alioth
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: Remars78/xiaomi_sm8250_kernel
          ref: main

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 llvm lld
          
      - name: Download Toolchain (Azure Clang 14)
        run: |
          git clone --depth=1 https://gitlab.com/Panchajanya1999/azure-clang.git clang
          
      - name: Patch alioth_defconfig (Fix KALLSYMS & KPROBES)
        run: |
          cd arch/arm64/configs/vendor
          # Убираем "is not set" и включаем KALLSYMS
          sed -i 's/# CONFIG_KALLSYMS is not set/CONFIG_KALLSYMS=y\nCONFIG_KALLSYMS_ALL=y/g' alioth_defconfig
          
          # Включаем KPROBES
          echo "CONFIG_KPROBES=y" >> alioth_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> alioth_defconfig
          echo "CONFIG_KPROBE_EVENTS=y" >> alioth_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> alioth_defconfig

      - name: Apply KernelPatch / KernelSU Next
        run: |
          if [ "${{ github.event.inputs.ksu_type }}" == "kernelsu-next" ]; then
            echo "Устанавливаем KernelSU Next..."
            curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          elif [ "${{ github.event.inputs.ksu_type }}" == "kernelpatch" ]; then
            echo "Устанавливаем классический KernelPatch..."
            curl -LSs "https://raw.githubusercontent.com/bmax121/KernelPatch/main/patch.sh" | bash
          fi

      - name: Compile Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          make O=out CC=clang LLVM=1 LLVM_IAS=1 vendor/alioth_defconfig
          make -j$(nproc --all) O=out CC=clang LLVM=1 LLVM_IAS=1
          
      - name: Create AnyKernel3 zip
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          rm -rf .git
          cp ../out/arch/arm64/boot/Image ./
          if [ -f ../out/arch/arm64/boot/dtbo.img ]; then
            cp ../out/arch/arm64/boot/dtbo.img ./
          fi
          
          # Настраиваем AnyKernel3 под Alioth
          sed -i 's/kernel.string=.*/kernel.string=Alioth Kernel Patched by Remars78/' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=alioth/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=poco f3/' anykernel.sh
          sed -i 's|block=.*|block=/dev/block/bootdevice/by-name/boot;|' anykernel.sh
          sed -i 's/is_slot_device=.*/is_slot_device=auto;/' anykernel.sh
          
          zip -r9 ../Alioth-Kernel-Patched.zip *
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alioth-Kernel-${{ github.event.inputs.ksu_type }}
          path: Alioth-Kernel-Patched.zip
